<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      background: #232f3e;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #37475a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <button id="fetchBtn">Fetch Loads</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
